<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanaju 3D model by Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #myCanvas {
            display: block;
        }
        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: x-large;
            width: 10em;
        }

</style>
</head>

<body>
    <canvas id="myCanvas"></canvas>
    <div class="container">
        <div class="item" id="loading">Loading: 0%</div>
    </div>

    <!-- Three.jsと必要なライブラリをCDNから読み込みます -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        //init 関数を実行するイベントリスナーを設定     
        window.addEventListener("DOMContentLoaded", init);

        function init() {

            //ウィンドウの幅と高さを取得し、width と height という変数に格納
            const width = window.innerWidth;
            const height = window.innerHeight;

            // レンダラーの設定
            const canvasElement = document.querySelector('#myCanvas');
            canvasElement.style.display ="none";
            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                canvas: canvasElement,
            });

            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(width, height);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.CineonToneMapping;

            // シーンの作成
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x808080);

            // カメラの作成
            const camera = new THREE.PerspectiveCamera(10, width / height, 0.2, 10);
            camera.position.set(0, 1.5, 0);
            camera.lookAt(new THREE.Vector3(0, 0, 0));

            // カメラコントローラーの作成
            const controls = new THREE.OrbitControls(camera, canvasElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.2;

            let model; // モデルを格納する変数

            // ウィンドウサイズ変更時の対応
            window.addEventListener('resize', () => {
                const width = window.innerWidth;
                const height = window.innerHeight;
                renderer.setSize(width, height);
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
            });

            // 3Dモデルの読み込み
            const gltfLoader = new THREE.GLTFLoader();
            const loadingElement = document.querySelector('#loading');
            gltfLoader.load('Nanaju.glb', (gltf) => {
                model = gltf.scene;

                // モデルをシーンに追加
                scene.add(model);
                model.scale.set(1, 1, 1);
                model.position.set(0, 0, 0);

                loadingElement.style.display ="none";
                canvasElement.style.display ="block";

            }, (xhr) => {
                const progress = Math.round((xhr.loaded / 40191332) * 100);
                loadingElement.textContent = "Loading: " + progress + "%";
            }, (error) => {
                console.error('GLBモデルの読み込み中にエラーが発生しました', error);
            });

            // アニメーションループ
            function tick() {
                controls.update();
                renderer.render(scene, camera);
                requestAnimationFrame(tick);
            }

            tick(); // 初回呼び出し
        }
    </script>
</body>

</html>
